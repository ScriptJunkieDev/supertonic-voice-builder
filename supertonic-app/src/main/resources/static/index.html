<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Supertonic Voice Builder</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, Segoe UI, sans-serif; background: #11131a; color: #f2f2f2; }
    body { margin: 0; padding: 24px; }
    .wrap { max-width: 1100px; margin: 0 auto; }
    .card { background: #1a1d27; border: 1px solid #2b3142; border-radius: 14px; padding: 18px; margin-bottom: 18px; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
    h1 { margin: 0 0 6px; }
    h2 { margin-top: 0; }
    label { display: block; margin: 10px 0 6px; color: #cfd6e6; }
    input, select, button { border-radius: 10px; border: 1px solid #3b4358; background: #10131b; color: white; padding: 10px 12px; font-size: 15px; }
    input[type=file] { width: calc(100% - 26px); }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .grid > div { min-width: 0; }
    button { cursor: pointer; background: #32405d; }
    button.primary { background: #4b66a1; border-color: #6984bd; }
    button:disabled { opacity: .6; cursor: wait; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 9px; border-bottom: 1px solid #2b3142; font-size: 14px; }
    .badge { padding: 3px 8px; border-radius: 999px; background: #2d3548; }
    .SUCCESS { background: #1f5c3a; } .FAILED { background: #6b2830; } .RUNNING { background: #64551f; } .QUEUED { background: #2d3548; }
    .log-header { margin: 10px 0; padding: 10px 12px; background: #0b0d12; border: 1px solid #2b3142; border-radius: 10px; font-size: 14px; }
    pre#log { white-space: pre-wrap; word-break: break-word; overflow: auto; max-height: 420px; background: #0b0d12; border-radius: 10px; padding: 14px; border: 1px solid #2b3142; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; line-height: 1.5; margin: 0; }
    .muted { color: #9aa6bd; }
    @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Supertonic Voice Builder</h1>
    <div class="muted">CPU-only Supertonic custom voice JSON training (Spring Boot).</div>
  </div>

  <div class="card">
    <h2>Create Voice</h2>
    <form id="jobForm">
      <label>Source WAV</label>
      <input id="file" name="file" type="file" accept="audio/wav,.wav" required />
      <div class="grid">
        <div><label>Voice Name</label><input id="voiceName" name="voiceName" placeholder="my_voice" required /></div>
        <div><label>Quality</label><select id="quality"><option value="fast">Fast - 1000 steps</option><option value="balanced" selected>Balanced - 3000 steps</option><option value="high">High - 6000 steps</option></select></div>
        <div><label>Learning Rate</label><input id="learningRate" name="learningRate" value="0.0002" /></div>
        <div><label>Reference Style</label><input id="referenceStyle" name="referenceStyle" value="auto" /></div>
      </div>
      <br />
      <button class="primary" type="submit">Train Voice</button>
    </form>
  </div>

  <div class="card">
    <h2>Training Jobs</h2>
    <table>
      <thead><tr><th>Status</th><th>Voice</th><th>Steps</th><th>Created</th><th>Actions</th></tr></thead>
      <tbody id="jobs"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Log</h2>
    <div class="log-header muted" id="selectedJob">Select a job to view logs.</div>
    <div class="muted" id="logMeta" style="font-size:12px;margin-bottom:8px;"></div>
    <pre id="log"></pre>
  </div>
</div>
<script>
const jobsEl = document.getElementById('jobs');
const logEl = document.getElementById('log');
const selectedJobEl = document.getElementById('selectedJob');
const logMetaEl = document.getElementById('logMeta');
let selectedJobId = null;
let selectedJobName = null;

function stepsForQuality(q) {
  if (q === 'fast') return 1000;
  if (q === 'high') return 6000;
  return 3000;
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
}

let pollTimer = null;

function schedulePoll() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(tick, 2000);
}

async function tick() {
  const res = await fetch('/api/jobs');
  const jobs = await res.json();
  await loadJobsFromList(jobs);
  if (!selectedJobId) return;
  const job = jobs.find(j => j.id === selectedJobId);
  if (job && selectedJobName) {
    setLogHeader(selectedJobName, selectedJobId, job.status, job.startedAt);
  }
  await refreshLog();
  if (job && (job.status === 'RUNNING' || job.status === 'QUEUED') && job.startedAt) {
    logMetaEl.textContent = `Live log · ${formatElapsedSince(job.startedAt)} · watch for [progress] every ~2 min and Step N/${job.steps} from trainer`;
  } else {
    logMetaEl.textContent = selectedJobId ? 'Select Log on a job or keep this panel open to follow output.' : '';
  }
}

async function loadJobs() {
  const res = await fetch('/api/jobs');
  await loadJobsFromList(await res.json());
}

async function loadJobsFromList(jobs) {
  jobsEl.innerHTML = jobs.map(j => `
    <tr>
      <td><span class="badge ${j.status}">${j.status}</span></td>
      <td>${escapeHtml(j.voiceName)}</td>
      <td>${j.steps}</td>
      <td>${j.createdAt ? new Date(j.createdAt).toLocaleString() : ''}</td>
      <td>
        <button type="button" data-job-id="${escapeHtml(j.id)}" data-job-name="${escapeHtml(j.voiceName)}" class="log-btn">Log</button>
        ${j.status === 'SUCCESS' ? `<a href="/api/jobs/${encodeURIComponent(j.id)}/download"><button type="button">Download JSON</button></a>` : ''}
      </td>
    </tr>`).join('');
  jobsEl.querySelectorAll('.log-btn').forEach(btn => {
    btn.addEventListener('click', () => showLog(btn.dataset.jobId, btn.dataset.jobName));
  });
}

function setLogHeader(name, id, status, startedAt) {
  let extra = status ? ` · ${status}` : '';
  if (startedAt && (status === 'RUNNING' || status === 'QUEUED')) {
    extra += formatElapsedSince(startedAt);
  }
  selectedJobEl.textContent = `${name} (${id})${extra}`;
}

function formatElapsedSince(iso) {
  const sec = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 1000));
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if (h > 0) return ` · running ${h}h ${m}m`;
  if (m > 0) return ` · running ${m}m ${s}s`;
  return ` · running ${s}s`;
}

let lastLogFetchAt = null;

async function refreshLog() {
  if (!selectedJobId) return;
  const res = await fetch(`/api/jobs/${encodeURIComponent(selectedJobId)}/log`);
  const text = await res.text();
  logEl.textContent = text || '(no log output yet)';
  logEl.scrollTop = logEl.scrollHeight;
  lastLogFetchAt = new Date();
}

async function showLog(id, name) {
  selectedJobId = id;
  selectedJobName = name;
  const jobsRes = await fetch('/api/jobs');
  const jobs = await jobsRes.json();
  const job = jobs.find(j => j.id === id);
  setLogHeader(name, id, job ? job.status : null, job ? job.startedAt : null);
  await refreshLog();
}

document.getElementById('jobForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData();
  fd.append('file', document.getElementById('file').files[0]);
  fd.append('voiceName', document.getElementById('voiceName').value);
  fd.append('steps', stepsForQuality(document.getElementById('quality').value));
  fd.append('learningRate', document.getElementById('learningRate').value);
  fd.append('referenceStyle', document.getElementById('referenceStyle').value);
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true;
  try {
    const res = await fetch('/api/jobs', { method: 'POST', body: fd });
    if (!res.ok) throw new Error(await res.text());
    const job = await res.json();
    await loadJobs();
    await showLog(job.id, job.voiceName);
  } finally {
    btn.disabled = false;
  }
});

schedulePoll();
loadJobs();
</script>
</body>
</html>
