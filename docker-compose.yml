services:
  supertonic-voice-builder:
    build: .
    image: supertonic-voice-builder:latest
    container_name: supertonic-voice-builder
    ports:
      - "7790:8080"
    environment:
      SERVER_PORT: 8080
      OMP_NUM_THREADS: 16
      MKL_NUM_THREADS: 16
      MAX_CONCURRENT_JOBS: 1
    volumes:
      - /mnt/user/appdata/supertonic-voice-builder/data:/data
      - /mnt/user/appdata/supertonic/voices:/voices
    restart: unless-stopped
