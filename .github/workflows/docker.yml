name: Build and Publish Docker Images

on:
  push:
    branches: [main, master]
    tags: [v*]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64
  IMAGE_NAME: towncraft-ptero-arm

jobs:
  towncraft-ptero-arm:
    name: towncraft-ptero-arm (runtime + install)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set GHCR owner (lowercase)
        run: echo "GHCR_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (runtime)
        id: meta_runtime
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.GHCR_OWNER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=java_21_python,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=tag

      - name: Build and push runtime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: runtime
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta_runtime.outputs.tags }}
          labels: ${{ steps.meta_runtime.outputs.labels }}

      - name: Extract metadata (install)
        id: meta_install
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.GHCR_OWNER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=java_21_python_install,enable={{is_default_branch}}
            type=sha,prefix=install-

      - name: Build and push install
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: install
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta_install.outputs.tags }}
          labels: ${{ steps.meta_install.outputs.labels }}
